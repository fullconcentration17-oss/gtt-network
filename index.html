<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTT NETWORK - Free Mining</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0f1a; color: white; font-family: sans-serif; }
        .gtt-gradient { background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%); }
        .mining-anim { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="p-5 flex justify-between items-center border-b border-gray-800">
        <h1 class="text-xl font-bold text-cyan-400">GTT.NETWORK</h1>
        <div class="hidden md:flex space-x-6 text-sm text-gray-400">
            <a href="#">HOW IT WORKS</a>
            <a href="#">PLANS</a>
            <a href="#">LEADERBOARD</a>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center px-5 text-center py-10">
        <div class="mb-4 flex items-center bg-green-900/30 px-4 py-1 rounded-full border border-green-500/50">
            <span class="w-2 h-2 bg-green-500 rounded-full mr-2 mining-anim"></span>
            <span class="text-green-400 text-xs font-mono uppercase tracking-widest">Live — 24,891 Miners Active</span>
        </div>

        <h2 class="text-4xl md:text-6xl font-extrabold mb-2">GTT <span class="text-green-400">NETWORK</span></h2>
        <p class="text-gray-400 mb-8">Mine <span class="font-bold text-white">GTT Tokens</span> — Completely Free</p>

        <p class="max-w-md text-gray-500 mb-10 text-sm leading-relaxed">
            Claim your GTT tokens every 24 hours. No investment needed. GTT will be listed on exchanges — your tokens will have real value.
        </p>

        <div class="w-full max-w-xs space-y-4">
            <button onclick="startMining()" class="w-full gtt-gradient py-4 rounded-lg font-bold text-black uppercase tracking-wider hover:opacity-90 transition">
                ⚡ Start Mining Free
            </button>
            <button class="w-full bg-transparent border border-gray-700 py-4 rounded-lg font-bold text-gray-400 uppercase tracking-wider hover:bg-gray-800 transition">
                How it Works
            </button>
        </div>

        <div class="grid grid-cols-2 gap-10 mt-20">
            <div>
                <p class="text-3xl font-bold text-cyan-400">24,894</p>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Total Miners</p>
            </div>
            <div>
                <p class="text-3xl font-bold text-green-400">8,234,773</p>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">GTT Mined</p>
            </div>
        </div>
    </main>

    <script>
        function startMining() {
            alert("Mining Started! You will receive 25 GTT in 24 hours.");
            // აქ შეიძლება დაემატოს ლოგიკა, რომელიც ტაიმერს ჩართავს
        }
    </script>
</body>
</html>
